<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEAT MONITOR — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --border: #2a2d3a;
  --text: #e0e0e8;
  --dim: #6b7084;
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.08);
  --green-border: rgba(52,211,153,0.25);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.08);
  --red-border: rgba(248,113,113,0.25);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.08);
  --amber-border: rgba(251,191,36,0.25);
  --flag-red: #ef4444;
  --flag-bg: rgba(239,68,68,0.12);
  --flag-border: rgba(239,68,68,0.4);
  --font: 'Inter', -apple-system, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── header ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }
.logo .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--dim); transition: background 0.4s;
}
.logo .dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }
.logo .dot.err { background: var(--red); }
.nav { display: flex; gap: 6px; }
.nav a {
  font-size: 12px; font-weight: 500; color: var(--dim); text-decoration: none;
  padding: 5px 12px; border-radius: 6px; border: 1px solid transparent; transition: all 0.2s;
}
.nav a:hover { color: var(--text); border-color: var(--border); }
.clock { font-size: 13px; color: var(--dim); font-variant-numeric: tabular-nums; }

/* ── main grid ── */
.main {
  flex: 1; display: grid;
  grid-template-columns: 1fr 480px;
  min-height: 0;
}

/* ── left: visualization ── */
.viz {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 32px; padding: 40px; position: relative;
  background: radial-gradient(ellipse at center, #13161f 0%, var(--bg) 70%);
}

.scene { display: flex; flex-direction: column; align-items: center; gap: 0; }
.persons { display: flex; gap: 60px; margin-bottom: -10px; z-index: 2; }

.person-slot {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  transition: all 0.5s;
}

.person-label {
  font-size: 12px; font-weight: 600; letter-spacing: 1px; transition: color 0.5s;
}

/* person SVG */
.person-figure {
  width: 90px; height: 130px; position: relative; transition: all 0.5s ease;
}
.person-figure svg { width: 100%; height: 100%; transition: all 0.5s ease; }

/* state colors for person */
.person-slot[data-state="vacant"] .person-label { color: var(--green); }
.person-slot[data-state="vacant"] .person-figure svg { opacity: 0.12; }
.person-slot[data-state="vacant"] .body-fill { fill: var(--dim); }
.person-slot[data-state="vacant"] .body-stroke { stroke: var(--dim); }

.person-slot[data-state="occupied"] .person-label { color: var(--red); }
.person-slot[data-state="occupied"] .person-figure svg { opacity: 1; }
.person-slot[data-state="occupied"] .body-fill { fill: var(--red); }
.person-slot[data-state="occupied"] .body-stroke { stroke: var(--red); }
.person-slot[data-state="occupied"] .person-figure {
  filter: drop-shadow(0 0 12px rgba(248,113,113,0.3));
}

.person-slot[data-state="away"] .person-label { color: var(--amber); }
.person-slot[data-state="away"] .person-figure svg { opacity: 0.25; }
.person-slot[data-state="away"] .body-fill { fill: var(--amber); }
.person-slot[data-state="away"] .body-stroke { stroke: var(--amber); }

.person-slot[data-state="flagged"] .person-label { color: var(--flag-red); }
.person-slot[data-state="flagged"] .person-figure svg { opacity: 0.35; }
.person-slot[data-state="flagged"] .body-fill { fill: var(--flag-red); }
.person-slot[data-state="flagged"] .body-stroke { stroke: var(--flag-red); }
.person-slot[data-state="flagged"] .person-figure {
  animation: flash 1s ease-in-out infinite;
}
@keyframes flash {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* badge */
.person-badge {
  font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
  padding: 3px 14px; border-radius: 20px; transition: all 0.5s;
  text-align: center; min-width: 100px;
}
.person-slot[data-state="vacant"] .person-badge {
  color: var(--green); background: var(--green-bg); border: 1px solid var(--green-border);
}
.person-slot[data-state="occupied"] .person-badge {
  color: var(--red); background: var(--red-bg); border: 1px solid var(--red-border);
}
.person-slot[data-state="away"] .person-badge {
  color: var(--amber); background: var(--amber-bg); border: 1px solid var(--amber-border);
}
.person-slot[data-state="flagged"] .person-badge {
  color: #fff; background: var(--flag-bg); border: 1px solid var(--flag-border);
  animation: flash 1s ease-in-out infinite;
}

/* away timer & belongings under badge */
.person-info {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  min-height: 36px; margin-top: 2px;
}
.away-timer {
  font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums;
  transition: color 0.5s;
}
.person-slot[data-state="away"] .away-timer { color: var(--amber); }
.person-slot[data-state="flagged"] .away-timer { color: var(--flag-red); }
.belonging-tags {
  display: flex; gap: 4px; flex-wrap: wrap; justify-content: center;
}
.belonging-tag {
  font-size: 9px; padding: 1px 6px; border-radius: 3px;
  background: rgba(255,255,255,0.06); color: var(--dim);
  border: 1px solid var(--border);
}

/* table */
.table-block {
  width: 340px; height: 70px;
  background: linear-gradient(180deg, #3d3225 0%, #2c2418 100%);
  border-radius: 10px; border: 1px solid #4a3d2e;
  z-index: 1; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
}
.table-block span { font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,0.1); font-weight: 500; }
.table-block::before, .table-block::after {
  content: ''; position: absolute; bottom: -18px;
  width: 6px; height: 18px; background: #2c2418; border-radius: 0 0 3px 3px;
}
.table-block { position: relative; }
.table-block::before { left: 30px; }
.table-block::after { right: 30px; }

/* banner */
.banner { text-align: center; }
.banner-count {
  font-size: 56px; font-weight: 700; line-height: 1; transition: color 0.5s;
}
.banner-count.none { color: var(--green); }
.banner-count.some { color: var(--amber); }
.banner-count.full { color: var(--red); }
.banner-sub { font-size: 13px; color: var(--dim); margin-top: 6px; letter-spacing: 1px; }

/* flag alert */
.flag-alert {
  display: none; padding: 10px 20px; border-radius: 8px;
  background: var(--flag-bg); border: 1px solid var(--flag-border);
  color: var(--flag-red); font-size: 13px; font-weight: 600;
  text-align: center; letter-spacing: 0.5px;
  animation: flash 1.5s ease-in-out infinite;
}
.flag-alert.show { display: block; }

/* ── right sidebar ── */
.sidebar {
  border-left: 1px solid var(--border); background: var(--card);
  display: flex; flex-direction: column; overflow-y: auto;
}
.section { padding: 18px 20px; border-bottom: 1px solid var(--border); }
.section-title {
  font-size: 11px; font-weight: 600; color: var(--dim);
  letter-spacing: 1.5px; margin-bottom: 12px;
}

.cam-box {
  width: 100%; aspect-ratio: 4/3; border-radius: 8px; overflow: hidden;
  background: #000; border: 1px solid var(--border); position: relative; min-height: 300px;
}
.cam-box img { width: 100%; height: 100%; object-fit: contain; display: none; }
.cam-box .placeholder {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--dim);
}

.controls { display: flex; gap: 6px; margin-top: 10px; }
.btn {
  flex: 1; padding: 8px 0; font-family: var(--font); font-size: 12px; font-weight: 600;
  border: 1px solid var(--border); border-radius: 6px; background: transparent;
  color: var(--text); cursor: pointer; transition: all 0.15s;
}
.btn:hover { background: rgba(255,255,255,0.04); }
.btn:disabled { opacity: 0.25; cursor: default; }
.btn:disabled:hover { background: transparent; }
.btn.active { border-color: var(--green); color: var(--green); background: var(--green-bg); }

.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat {
  background: rgba(0,0,0,0.25); border-radius: 8px; padding: 12px;
  border: 1px solid var(--border);
}
.stat-label { font-size: 10px; color: var(--dim); letter-spacing: 1px; font-weight: 500; }
.stat-val { font-size: 24px; font-weight: 700; margin-top: 2px; }

.log {
  flex: 1; font-size: 11px; line-height: 1.9; color: var(--dim);
  overflow-y: auto; max-height: 180px;
}
.log .ts { color: var(--green); }
.log .hi { color: var(--text); }
.log .warn { color: var(--amber); }
.log .danger { color: var(--flag-red); font-weight: 600; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="dot" id="status-dot"></div>
    <h1>Seat Monitor</h1>
    <span class="clock" id="clock">--:--:--</span>
  </div>
  <nav class="nav">
    <a href="/">Detector</a>
    <a href="/annotator">Annotate</a>
    <a href="/history">History</a>
  </nav>
</header>

<main class="main">

  <div class="viz">
    <div class="scene">
      <div class="persons">

        <div class="person-slot" data-state="vacant" id="slot-a">
          <span class="person-label">SEAT A</span>
          <div class="person-figure">
            <svg viewBox="0 0 80 120" fill="none">
              <circle cx="40" cy="22" r="16" class="body-fill body-stroke" stroke-width="2"/>
              <path d="M12 120 C12 75, 14 55, 40 48 C66 55, 68 75, 68 120" class="body-fill body-stroke" stroke-width="2"/>
              <path d="M8 90 Q10 70, 40 60 Q70 70, 72 90" class="body-stroke" stroke-width="2" fill="none"/>
            </svg>
          </div>
          <span class="person-badge" id="badge-a">VACANT</span>
          <div class="person-info">
            <span class="away-timer" id="timer-a"></span>
            <div class="belonging-tags" id="belong-a"></div>
          </div>
        </div>

        <div class="person-slot" data-state="vacant" id="slot-b">
          <span class="person-label">SEAT B</span>
          <div class="person-figure">
            <svg viewBox="0 0 80 120" fill="none">
              <circle cx="40" cy="22" r="16" class="body-fill body-stroke" stroke-width="2"/>
              <path d="M12 120 C12 75, 14 55, 40 48 C66 55, 68 75, 68 120" class="body-fill body-stroke" stroke-width="2"/>
              <path d="M8 90 Q10 70, 40 60 Q70 70, 72 90" class="body-stroke" stroke-width="2" fill="none"/>
            </svg>
          </div>
          <span class="person-badge" id="badge-b">VACANT</span>
          <div class="person-info">
            <span class="away-timer" id="timer-b"></span>
            <div class="belonging-tags" id="belong-b"></div>
          </div>
        </div>

      </div>
      <div class="table-block"><span>TABLE</span></div>
    </div>

    <div class="banner">
      <div class="banner-count none" id="banner-count">0 / 2</div>
      <div class="banner-sub">SEATS OCCUPIED</div>
    </div>

    <div class="flag-alert" id="flag-alert">
      &#x26A0; ILLEGAL OCCUPATION DETECTED — belongings left unattended
    </div>
  </div>

  <div class="sidebar">
    <div class="section">
      <div class="section-title">LIVE FEED</div>
      <div class="cam-box">
        <div class="placeholder" id="cam-ph">No feed</div>
        <img id="cam-img" alt="">
      </div>
      <input type="text" id="cam-url-input" placeholder="http://YOUR_ESP32_IP/capture"
             style="width:100%;font-family:var(--font);font-size:11px;padding:6px 8px;margin-top:8px;
                    background:rgba(0,0,0,0.3);color:var(--text);border:1px solid var(--border);border-radius:6px;">
      <div class="controls">
        <button class="btn" id="btn-snap">Snap</button>
        <button class="btn" id="btn-live">Live</button>
        <button class="btn" id="btn-stop" disabled>Stop</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">STATS</div>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">PERSONS</div>
          <div class="stat-val" id="s-persons">--</div>
        </div>
        <div class="stat">
          <div class="stat-label">OCC RATE</div>
          <div class="stat-val" id="s-rate">--</div>
        </div>
        <div class="stat">
          <div class="stat-label">LATENCY</div>
          <div class="stat-val" id="s-latency">--</div>
        </div>
        <div class="stat">
          <div class="stat-label">SCANS</div>
          <div class="stat-val" id="s-scans">0</div>
        </div>
      </div>
    </div>

    <div class="section" style="flex:1;">
      <div class="section-title">LOG</div>
      <div class="log" id="log"></div>
    </div>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);
// Set camera URL via query param: ?cam=http://192.168.1.100/capture
const defaultCam = new URLSearchParams(location.search).get("cam") || "";
let liveTimer = null, busy = false, scans = 0;

function getCamURL() {
  return ($('cam-url-input').value || '').trim();
}
let prevStates = { a: null, b: null };

setInterval(() => {
  const d = new Date(), p = n => String(n).padStart(2,'0');
  $('clock').textContent = `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}, 1000);

function log(msg) {
  const el = document.createElement('div');
  const d = new Date(), p = n => String(n).padStart(2,'0');
  el.innerHTML = `<span class="ts">[${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}]</span> ${msg}`;
  $('log').insertBefore(el, $('log').firstChild);
  while ($('log').children.length > 50) $('log').removeChild($('log').lastChild);
}

function fmtTime(sec) {
  if (sec == null) return '';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
  if (m > 0) return `${m}m ${String(s).padStart(2,'0')}s`;
  return `${s}s`;
}

const BADGE_TEXT = {
  vacant: 'VACANT',
  occupied: 'OCCUPIED',
  away: 'AWAY',
  flagged: '⚠ FLAGGED',
};

function setSeat(id, seatData) {
  const state = seatData.state || 'vacant';
  const slot = $('slot-' + id);
  const badge = $('badge-' + id);
  const timer = $('timer-' + id);
  const belong = $('belong-' + id);

  slot.setAttribute('data-state', state);
  badge.textContent = BADGE_TEXT[state] || state.toUpperCase();

  // timer
  if ((state === 'away' || state === 'flagged') && seatData.away_seconds != null) {
    timer.textContent = fmtTime(seatData.away_seconds);
  } else {
    timer.textContent = '';
  }

  // belongings
  const items = seatData.belongings || [];
  belong.innerHTML = items.map(b => `<span class="belonging-tag">${b}</span>`).join('');

  // log state changes
  if (prevStates[id] !== state) {
    if (state === 'away') {
      const itemStr = items.length ? ` (${items.join(', ')})` : '';
      log(`<span class="warn">Seat ${id.toUpperCase()}: person left, belongings remain${itemStr}</span>`);
    } else if (state === 'flagged') {
      log(`<span class="danger">⚠ Seat ${id.toUpperCase()}: FLAGGED — unattended belongings > 1h</span>`);
    } else if (state === 'occupied' && prevStates[id] === 'away') {
      log(`<span class="hi">Seat ${id.toUpperCase()}: person returned</span>`);
    } else if (state === 'occupied' && prevStates[id] === 'flagged') {
      log(`<span class="hi">Seat ${id.toUpperCase()}: person returned, flag cleared</span>`);
    } else if (state === 'vacant' && (prevStates[id] === 'away' || prevStates[id] === 'flagged')) {
      log(`<span class="hi">Seat ${id.toUpperCase()}: belongings removed, now vacant</span>`);
    }
    prevStates[id] = state;
  }
}

function updateBanner(seatStatuses) {
  const occ = seatStatuses.filter(s => s.state !== 'vacant').length;
  const el = $('banner-count');
  el.textContent = `${occ} / 2`;
  el.classList.remove('none','some','full');
  el.classList.add(occ === 0 ? 'none' : occ >= 2 ? 'full' : 'some');

  const hasFlag = seatStatuses.some(s => s.state === 'flagged');
  $('flag-alert').classList.toggle('show', hasFlag);
}

async function capture(silent) {
  if (busy) return;
  if (!getCamURL()) {
    log('<span class="danger">Enter a camera URL first</span>');
    return;
  }
  busy = true;
  $('status-dot').className = 'dot';

  try {
    const res = await fetch('/api/capture-detect', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({url: getCamURL(), model:'nano', conf:0.25, iou:0.45}),
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error);

    $('cam-img').src = d.annotated_image;
    $('cam-img').style.display = 'block';
    $('cam-ph').style.display = 'none';

    const seats = d.seats;
    const persons = d.library.persons;

    if (seats.defined && seats.status.length >= 2) {
      setSeat('a', seats.status[0]);
      setSeat('b', seats.status[1]);
      updateBanner(seats.status);
    } else if (seats.defined && seats.status.length === 1) {
      setSeat('a', seats.status[0]);
      setSeat('b', { state: 'vacant', belongings: [] });
      updateBanner(seats.status);
    } else {
      const occ = Math.min(persons, 2);
      setSeat('a', { state: occ >= 1 ? 'occupied' : 'vacant', belongings: [] });
      setSeat('b', { state: occ >= 2 ? 'occupied' : 'vacant', belongings: [] });
      updateBanner([{ state: occ >= 1 ? 'occupied' : 'vacant' }, { state: occ >= 2 ? 'occupied' : 'vacant' }]);
    }

    scans++;
    $('s-persons').textContent = persons;
    const rate = seats.defined && seats.occupancy_rate !== null
      ? (seats.occupancy_rate * 100).toFixed(0) + '%'
      : (Math.min(persons,2) * 50) + '%';
    $('s-rate').textContent = rate;
    $('s-latency').textContent = d.elapsed_ms.toFixed(0) + 'ms';
    $('s-scans').textContent = scans;
    $('status-dot').className = 'dot live';

    if (!silent) log(`<span class="hi">${persons} person(s)</span> · ${d.elapsed_ms.toFixed(0)}ms`);

  } catch (e) {
    $('status-dot').className = 'dot err';
    log(`<span class="danger">Error:</span> ${e.message}`);
  } finally {
    busy = false;
  }
}

$('btn-snap').onclick = () => capture(false);
$('btn-live').onclick = () => {
  if (liveTimer) return;
  log('Live started');
  const tick = () => { if (!busy) capture(true); };
  tick();
  liveTimer = setInterval(tick, 2000);
  $('btn-live').disabled = true;
  $('btn-live').classList.add('active');
  $('btn-stop').disabled = false;
};
$('btn-stop').onclick = () => {
  if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
  log('Live stopped');
  $('btn-live').disabled = false;
  $('btn-live').classList.remove('active');
  $('btn-stop').disabled = true;
  $('status-dot').className = 'dot';
};

// init cam URL from query param
$('cam-url-input').value = defaultCam;

log('Dashboard ready');
log('States: <span class="hi">occupied</span> · <span class="warn">away</span> · <span class="danger">flagged (>1h)</span> · vacant');
</script>
</body>
</html>
